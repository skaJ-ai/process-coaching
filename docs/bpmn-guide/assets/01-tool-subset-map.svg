<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
      .h { font: 700 19px 'Segoe UI', sans-serif; fill: #0f172a; }
      .t { font: 500 15px 'Segoe UI', sans-serif; fill: #1e293b; }
      .ok { fill: #16a34a; }
      .warn { fill: #d97706; }
      .no { fill: #dc2626; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .chip { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.5; rx: 10; }
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="680" fill="#f1f5f9"/>
  <text x="48" y="62" class="title">BPMN 2.0 vs Process-Coaching Tool Subset</text>

  <rect class="card" x="46" y="96" width="358" height="520"/>
  <text x="72" y="136" class="h">Tool Supported (Use)</text>
  <rect class="chip" x="72" y="156" width="304" height="70"/><text x="90" y="196" class="t">Start / End Event</text>
  <rect class="chip" x="72" y="238" width="304" height="70"/><text x="90" y="278" class="t">Task (process), Subprocess</text>
  <rect class="chip" x="72" y="320" width="304" height="70"/><text x="90" y="360" class="t">Exclusive Decision (XOR)</text>
  <rect class="chip" x="72" y="402" width="304" height="70"/><text x="90" y="442" class="t">Sequence Flow + Condition Label</text>
  <rect class="chip" x="72" y="484" width="304" height="100"/><text x="90" y="526" class="t">Swimlane (Y), Phase Divider (X)</text><text x="90" y="552" class="t">for role/step readability</text>
  <circle cx="358" cy="132" r="8" class="ok"/>

  <rect class="card" x="420" y="96" width="358" height="520"/>
  <text x="446" y="136" class="h">Partially Supported (Caution)</text>
  <rect class="chip" x="446" y="156" width="304" height="100"/><text x="464" y="196" class="t">AND Parallel split/join</text><text x="464" y="222" class="t">No dedicated '+' gateway node yet</text>
  <rect class="chip" x="446" y="270" width="304" height="100"/><text x="464" y="310" class="t">Pool/message flow</text><text x="464" y="336" class="t">Can be documented as metadata/text</text>
  <rect class="chip" x="446" y="384" width="304" height="100"/><text x="464" y="424" class="t">Event detail types</text><text x="464" y="450" class="t">Timer/Message/Error are out of canvas scope</text>
  <circle cx="732" cy="132" r="8" class="warn"/>

  <rect class="card" x="794" y="96" width="358" height="520"/>
  <text x="820" y="136" class="h">Not in Current Scope (Exclude)</text>
  <rect class="chip" x="820" y="156" width="304" height="100"/><text x="838" y="196" class="t">Complex/Event/Inclusive Gateway</text><text x="838" y="222" class="t">(standard exists, not offered in UI)</text>
  <rect class="chip" x="820" y="270" width="304" height="100"/><text x="838" y="310" class="t">Boundary / Intermediate Events</text><text x="838" y="336" class="t">(execution-level modeling)</text>
  <rect class="chip" x="820" y="384" width="304" height="100"/><text x="838" y="424" class="t">Choreography / Conversation Diagram</text><text x="838" y="450" class="t">(outside this product objective)</text>
  <circle cx="1106" cy="132" r="8" class="no"/>
</svg>