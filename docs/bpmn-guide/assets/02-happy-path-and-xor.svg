<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
      .lbl { font: 600 14px 'Segoe UI', sans-serif; fill: #0f172a; }
      .txt { font: 500 13px 'Segoe UI', sans-serif; fill: #334155; }
      .task { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 10; }
      .evs { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
      .eve { fill: #fee2e2; stroke: #b91c1c; stroke-width: 4; }
      .gw { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="540" fill="#f8fafc"/>
  <text x="48" y="62" class="title">Recommended Flow Pattern (Happy Path + XOR Branch)</text>

  <circle cx="120" cy="260" r="30" class="evs"/>
  <text x="103" y="306" class="lbl">Start</text>

  <rect x="220" y="224" width="180" height="72" class="task"/>
  <text x="264" y="266" class="lbl">요청 접수</text>

  <polygon points="500,208 552,260 500,312 448,260" class="gw"/>
  <text x="494" y="266" class="lbl">X</text>
  <text x="462" y="336" class="txt">결재 필요?</text>

  <rect x="630" y="120" width="180" height="72" class="task"/>
  <text x="678" y="162" class="lbl">결재 요청</text>

  <rect x="630" y="332" width="180" height="72" class="task"/>
  <text x="666" y="374" class="lbl">자동 처리</text>

  <rect x="900" y="224" width="180" height="72" class="task"/>
  <text x="948" y="266" class="lbl">결과 통보</text>

  <circle cx="1135" cy="260" r="32" class="eve"/>
  <text x="1119" y="307" class="lbl">End</text>

  <path d="M150 260 L220 260" class="line"/>
  <path d="M400 260 L448 260" class="line"/>
  <path d="M552 246 L630 156" class="line"/>
  <path d="M552 274 L630 368" class="line"/>
  <path d="M810 156 L900 246" class="line"/>
  <path d="M810 368 L900 274" class="line"/>
  <path d="M1080 260 L1103 260" class="line"/>

  <text x="586" y="205" class="txt">Yes</text>
  <text x="586" y="330" class="txt">No</text>
</svg>