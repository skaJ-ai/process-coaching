<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .phase { stroke: #a855f7; stroke-width: 2; stroke-dasharray: 8 8; }
      .laneLabel { font: 700 15px 'Segoe UI', sans-serif; fill: #0f172a; }
      .phaseLabel { font: 700 14px 'Segoe UI', sans-serif; fill: #7e22ce; }
      .task { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.7; rx: 8; }
      .txt { font: 600 13px 'Segoe UI', sans-serif; fill: #0f172a; }
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="620" fill="#f8fafc"/>
  <text x="48" y="62" class="title">Lane + Phase Layout Template (for this tool)</text>

  <rect x="90" y="120" width="1020" height="420" class="lane"/>
  <line x1="90" y1="260" x2="1110" y2="260" class="lane"/>
  <line x1="90" y1="400" x2="1110" y2="400" class="lane"/>

  <line x1="350" y1="120" x2="350" y2="540" class="phase"/>
  <line x1="620" y1="120" x2="620" y2="540" class="phase"/>
  <line x1="890" y1="120" x2="890" y2="540" class="phase"/>

  <text x="20" y="195" class="laneLabel">Lane A (예: 담당자)</text>
  <text x="20" y="335" class="laneLabel">Lane B (예: 팀장)</text>
  <text x="20" y="475" class="laneLabel">Lane C (예: 시스템)</text>

  <text x="180" y="105" class="phaseLabel">Phase 1</text>
  <text x="450" y="105" class="phaseLabel">Phase 2</text>
  <text x="720" y="105" class="phaseLabel">Phase 3</text>
  <text x="980" y="105" class="phaseLabel">Phase 4</text>

  <rect x="130" y="160" width="170" height="52" class="task"/><text x="164" y="192" class="txt">요청 수신</text>
  <rect x="390" y="300" width="170" height="52" class="task"/><text x="424" y="332" class="txt">검토/판정</text>
  <rect x="660" y="440" width="170" height="52" class="task"/><text x="694" y="472" class="txt">시스템 반영</text>
  <rect x="930" y="300" width="170" height="52" class="task"/><text x="964" y="332" class="txt">결과 통보</text>
</svg>